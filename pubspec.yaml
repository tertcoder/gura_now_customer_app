name: gura_now
description: "Gura Now - Marketplace mobile pour le Burundi avec livraison intégrée"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.0
  connectivity_plus: ^5.0.0
  dartz: ^0.10.1
  dio: ^5.3.0
  equatable: ^2.0.7
  flutter_bloc: ^8.1.6
  flutter_svg: ^2.0.9
  get_it: ^9.0.5
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^6.1.0
  flutter_riverpod: ^2.4.0
  flutter_secure_storage: ^9.0.0
  fluttertoast: ^9.0.0
  geolocator: ^10.1.0
  go_router: ^12.0.0
  google_fonts: ^6.0.0
  image_picker: ^1.0.0
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  latlong2: ^0.9.0
  logger: ^2.1.0
  pin_code_fields: ^8.0.1
  riverpod: ^2.4.0
  shared_preferences: ^2.2.0
  smooth_page_indicator: ^1.1.0
  timeago: ^3.5.0
  uuid: ^4.0.0
  web_socket_channel: ^2.4.0

dev_dependencies:
  # ============================================================================
  # CODE GENERATION
  # ============================================================================
  build_runner: ^2.4.0

  # ============================================================================
  # LINTING & ANALYSIS
  # ============================================================================
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

  # ============================================================================
  # TESTING
  # ============================================================================
  mockito: ^5.4.0
  mocktail: ^1.0.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  # ============================================================================
  # ASSETS
  # ============================================================================
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/pngs/
    - assets/logos/svgs/
